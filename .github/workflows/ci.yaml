name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Newer commits on the same branch cancel in-flight runs
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Reads the pinned version from package.json "packageManager"
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      # No Resend env vars in CI: the contact route reads them at runtime
      # only, and dev/preview builds simulate sends without them.
      - name: Build
        run: pnpm build
